name: Chore
description: Maintenance / housekeeping with no user-facing change.
labels: ["needs-triage"]
type: Chore
body:
  - type: input
    id: goal
    attributes:
      label: Goal (1 line)
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      options: ["S", "M", "L"]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ["P0", "P1", "P2", "P3"]
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: Tier
      options: ["T1", "T2", "T3"]
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: A markdown table, one row per atomic observable end-state.
      value: |
        | AC | Criterion |
        |----|-----------|
        | 1  |  |
    validations:
      required: true
