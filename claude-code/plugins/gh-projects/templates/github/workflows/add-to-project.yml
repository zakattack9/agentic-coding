# add-to-project — auto-add newly-opened issues / PRs in this repo to the org
# board. Installed per-repo by `scaffold-repo`.
#
# Why this instead of GitHub's built-in "Auto-add" workflow: the built-in is
# UI-only and has NO API to create it — so scaffold installs this first-party
# `actions/add-to-project` action instead. The action is SHA-PINNED (stricter
# than the tag-pinned board-sync/signals-sync templates) because it is a
# longer-lived third-party supply-chain surface; every third-party action below
# is pinned to a full 40-char commit SHA.
#
# Boundaries enforced HERE (break the system if missed):
#   * Every Projects v2 write uses a GitHub App INSTALLATION token, passed to the
#     add-to-project action as `github-token` — NEVER GITHUB_TOKEN (which cannot
#     write org Projects v2; constraint #2). The job's default
#     GITHUB_TOKEN is read-only and is never used for the project write.
#   * DETERMINISTIC & FREE — there is NO metered-AI/model step here.
#   * Idempotent: actions/add-to-project no-ops an item already on the board, so
#     a replayed `opened` event never duplicates the card.
#
# Required org/repo config:
#   vars.GH_PROJECT_OWNER  — the org login that owns the board Project
#   vars.GH_PROJECT_URL    — the full https URL of the org board Project
#   secrets.GH_APP_ID + secrets.GH_APP_PRIVATE_KEY — the GitHub App that can
#     write Projects v2 (org-scoped). NEVER the default token.

name: "~ GH Projects: Add To Project"

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

# Read-only default token — it CANNOT write Projects v2 and is never used for the
# project write. The add-to-project step writes with the App installation token.
permissions:
  contents: read

concurrency:
  # One add per content node; never race two adds for the same item.
  group: add-to-project-${{ github.event.issue.node_id || github.event.pull_request.node_id }}
  cancel-in-progress: false

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      # Mint a GitHub App INSTALLATION token (NEVER GITHUB_TOKEN) — the only token
      # that can write org Projects v2 (constraint #2). SHA-pinned third party.
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@5d869da34e18e7287c1daad50e0b8ea0f506ce69 # v1.11.0
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ vars.GH_PROJECT_OWNER }}

      # Auto-add the opened issue / PR to the org board. SHA-PINNED. The
      # project write authenticates with the App token via `github-token`, never
      # the default GITHUB_TOKEN.
      - name: Add to org board
        uses: actions/add-to-project@244f685bbc3b7adfa8466e08b698b5577571133e # v1.0.2
        with:
          project-url: ${{ vars.GH_PROJECT_URL }}
          github-token: ${{ steps.app-token.outputs.token }}
