# signals-sync — recompute the board's deterministic Gantt-signals + post the
# project Status update. Installed into a consuming repo by `scaffold-repo`.
#
# Boundaries enforced HERE (break the system if missed):
#   * DETERMINISTIC & FREE — there is NO metered-LLM step in this workflow (no
#     provider SDK, no inference endpoint). Every signal is computed by the
#     vendored stdlib-python
#     `.github/signals.py` (pure arithmetic + blocked-by DAG math).
#   * Every Projects v2 write uses a GitHub App INSTALLATION token, passed to the
#     script as GH_APP_TOKEN — NEVER GITHUB_TOKEN (constraint #2). The
#     job's GITHUB_TOKEN is read-only and is NOT used for any Project write.
#   * We do NOT use `on: projects_v2_item:` (no repo trigger exists, constraint
#     #1). We drive recompute from issues / pull_request events + a cron.
#   * The script writes per-item field VALUES + posts createProjectV2StatusUpdate
#     only; it never edits an option list / iterationConfiguration.
#
# Required repo/org config:
#   vars.GH_PROJECT_OWNER   — the org login that owns the Project
#   vars.GH_PROJECT_NUMBER  — the Project number
#   secrets.GH_APP_ID + secrets.GH_APP_PRIVATE_KEY — the GitHub App that can
#     write Projects v2 (org-scoped, `project` scope). NEVER the default token.

name: "~ GH Projects: Signals Sync"

on:
  issues:
    # Recompute when scheduling/dependency-relevant issue facts change.
    types: [opened, closed, reopened, edited, milestoned, demilestoned, labeled, unlabeled]
  pull_request:
    types: [opened, closed, reopened, ready_for_review, converted_to_draft]
  schedule:
    # Low-frequency backstop so date-driven signals (Overdue / Slippage) stay
    # live even with no events — once every 12 hours (00:00 & 12:00 UTC). To
    # change the cadence, edit this one line: GitHub requires a literal cron
    # expression here — it cannot read a repo var/secret.
    - cron: "0 */12 * * *"
  workflow_dispatch: {}

# Read-only default token — it CANNOT write Projects v2 fields and is never used
# for a Project write. All Project writes go through the App installation token.
permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  # Coalesce bursts of events into one recompute; never run two writers at once.
  group: signals-sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for the vendored .github/signals.py)
        uses: actions/checkout@v4

      - name: Set up Python (stdlib only — no pip install)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Mint a GitHub App INSTALLATION token (NEVER GITHUB_TOKEN) for the Project
      # writes. This is the only token that can mutate Projects v2 (constraint #2).
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ vars.GH_PROJECT_OWNER }}

      - name: Recompute signals + post the project Status update (deterministic, no AI)
        env:
          # The vendored script reads GH_APP_TOKEN for every Projects write and
          # NEVER GITHUB_TOKEN. `gh` authenticates with the same App token.
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_OWNER: ${{ vars.GH_PROJECT_OWNER }}
          PROJECT_NUMBER: ${{ vars.GH_PROJECT_NUMBER }}
        run: |
          python3 .github/signals.py \
            --owner "$PROJECT_OWNER" \
            --number "$PROJECT_NUMBER" \
            --apply
